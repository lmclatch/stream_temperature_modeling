train_basin_file: /uufs/chpc.utah.edu/common/home/u1566670/hydroinformatics/stream_temperature_modeling/conus/data/folds/fold2_withQ_train.txt
validation_basin_file: /uufs/chpc.utah.edu/common/home/u1566670/hydroinformatics/stream_temperature_modeling/conus/data/folds/fold2_withQ_train.txt
