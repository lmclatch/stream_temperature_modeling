- gvf_max
- gvf_diff
- p_mean
- pet_mean
- aridity
- frac_snow
- soil_depth_pelletier
- soil_depth_statsgo
- soil_porosity
- soil_conductivity
- max_water_content
- sand_frac
- clay_frac
- organic_frac
